<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Instagram Grid Widget</title>

<style>
body {
  margin: 0;
  background: #f5f5f5;
  font-family: sans-serif;
}

.header {
  padding: 10px;
}

button {
  padding: 6px 12px;
  border: none;
  background: black;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 10px;
}

.post {
  position: relative;
  aspect-ratio: 1;
  overflow: hidden;
  border-radius: 12px;
  cursor: grab;
}

.post:hover::after {
  content: attr(data-title);
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 5px;
  background: rgba(0,0,0,0.6);
  color: white;
  font-size: 12px;
}

/* media */
img, video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* carousel */
.carousel {
  display: flex;
  overflow-x: auto;
}

.carousel img {
  min-width: 100%;
}

/* drag UX */
.post.dragging {
  opacity: 0;
}

.drag-preview {
  position: fixed;
  pointer-events: none;
  z-index: 1000;
  width: 120px;
  height: 120px;
  object-fit: cover;
  border-radius: 12px;
  transform: scale(1.05);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.placeholder {
  background: rgba(0,0,0,0.1);
  border-radius: 12px;
}

.grid .post {
  transition: all 0.2s ease;
}
</style>
</head>

<body>

<div class="header">
  <button onclick="loadPosts()">Refresh</button>
</div>

<div class="grid" id="grid"></div>

<script>

let posts = [];

// 🔄 LOAD DATA FROM API
async function loadPosts(){
  const res = await fetch("/api/posts");
  posts = await res.json();
  render();
}

// 🎨 RENDER GRID
function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  posts.forEach((post, i) => {
    const div = document.createElement("div");
    div.className = "post";
    div.dataset.index = i;
    div.dataset.title = post.title;

    if(post.type === "carousel"){
      div.innerHTML = `<div class="carousel">
        ${post.media.map(m => `<img src="${m}">`).join("")}
      </div>`;
    }
    else if(post.type === "video"){
      div.innerHTML = `<video src="${post.media[0]}" autoplay muted loop></video>`;
    }
    else {
      div.innerHTML = `<img src="${post.media[0]}">`;
    }

    grid.appendChild(div);
  });

  enableDrag();
}

// 🧠 DRAG SYSTEM PRO
let dragEl = null;
let preview = null;
let placeholder = null;

function enableDrag() {
  const grid = document.getElementById("grid");

  grid.querySelectorAll(".post").forEach((el) => {

    el.addEventListener("mousedown", (e) => {
      dragEl = el;

      // preview
      preview = el.cloneNode(true);
      preview.classList.add("drag-preview");
      document.body.appendChild(preview);

      movePreview(e);

      // placeholder
      placeholder = document.createElement("div");
      placeholder.className = "post placeholder";

      el.classList.add("dragging");

      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  });
}

function movePreview(e) {
  preview.style.left = e.clientX - 60 + "px";
  preview.style.top = e.clientY - 60 + "px";
}

function onMove(e) {
  movePreview(e);

  const grid = document.getElementById("grid");
  const items = [...grid.querySelectorAll(".post:not(.dragging)")];

  let closest = null;
  let minDist = Infinity;

  items.forEach(item => {
    const rect = item.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    const dist = Math.hypot(e.clientX - cx, e.clientY - cy);

    if (dist < minDist) {
      minDist = dist;
      closest = item;
    }
  });

  if (closest) {
    grid.insertBefore(placeholder, closest);
  }
}

function onUp() {
  const grid = document.getElementById("grid");

  if (placeholder && dragEl) {
    grid.insertBefore(dragEl, placeholder);
  }

  dragEl.classList.remove("dragging");

  preview.remove();
  placeholder.remove();

  preview = null;
  placeholder = null;
  dragEl = null;

  updateOrder();

  document.removeEventListener("mousemove", onMove);
  document.removeEventListener("mouseup", onUp);
}

// 🔄 UPDATE ORDER
function updateOrder(){
  const grid = document.getElementById("grid");
  const newPosts = [];

  grid.querySelectorAll(".post").forEach(el => {
    const index = el.dataset.index;
    newPosts.push(posts[index]);
  });

  posts = newPosts;
  render();
}

// INIT
loadPosts();

</script>

</body>
</html>
