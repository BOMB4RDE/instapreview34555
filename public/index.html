<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  background: #f5f5f5;
  font-family: sans-serif;
}

/* empêche sélection texte */
* {
  user-select: none;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 10px;
}

.post {
  aspect-ratio: 1;
  border-radius: 12px;
  overflow: hidden;
  background: #ddd;
  position: relative;
  cursor: grab;
}

/* media */
img, video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* carousel */
.carousel {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
}

.carousel img {
  min-width: 100%;
  scroll-snap-align: start;
}

/* drag */
.dragging {
  opacity: 0.3;
}

  .carousel {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

.carousel-track {
  display: flex;
  height: 100%;
  transition: transform 0.3s ease;
}

.carousel-track img {
  min-width: 100%;
  height: 100%;
  object-fit: cover;
}

/* flèches */
.carousel-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  cursor: pointer;
  display: none;
}

.carousel:hover .carousel-btn {
  display: block;
}

.carousel-btn.left {
  left: 5px;
}

.carousel-btn.right {
  right: 5px;
}
</style>
</head>

<body>

<div class="grid" id="grid"></div>

<script>

let posts = [];
let draggedIndex = null;

// LOAD DATA
async function loadPosts(){
  try {
    const res = await fetch("https://instapreview34555-ag0j73tmx-bomb4rdes-projects.vercel.app/api/posts");
    
    const data = await res.json();

    console.log("DATA API:", data); // 👈 IMPORTANT

    posts = data;
    render();

  } catch (err) {
    console.error("ERREUR FETCH:", err);
  }
}

// RENDER
function render(){
  const grid = document.getElementById("grid");

  if(!grid){
    console.error("❌ GRID INTROUVABLE");
    return;
  }

  console.log("POSTS:", posts);

  grid.innerHTML = "";

  posts.forEach(post => {
    const div = document.createElement("div");

    div.style.background = "red";
    div.style.height = "100px";
    div.style.margin = "10px";

    div.innerText = post.title;

    grid.appendChild(div);
  });
}

    // DRAG EVENTS
    div.addEventListener("dragstart", () => {
      draggedIndex = index;
      div.classList.add("dragging");
    });

    div.addEventListener("dragend", () => {
      div.classList.remove("dragging");
    });

    div.addEventListener("dragover", (e) => {
      e.preventDefault();
    });

    div.addEventListener("drop", () => {
      const temp = posts[draggedIndex];
      posts.splice(draggedIndex, 1);
      posts.splice(index, 0, temp);
      render();
    });

    grid.appendChild(div);
  });
}

loadPosts();

</script>

</body>
</html>
