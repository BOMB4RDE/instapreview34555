<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 10px;
}

.post {
  aspect-ratio: 1;
  border-radius: 12px;
  overflow: hidden;
  background: #ddd;
  position: relative;
}

img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* carousel */
.carousel {
  position: relative;
  width: 100%;
  height: 100%;
}

.carousel-track {
  display: flex;
  height: 100%;
  transition: transform 0.3s ease;
}

.carousel-track img {
  min-width: 100%;
}

/* buttons */
.btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: none;
  cursor: pointer;
}

.carousel:hover .btn {
  display: block;
}

.left { left: 5px; }
.right { right: 5px; }

</style>
</head>

<body>

<div class="grid" id="grid"></div>

<script>

const API_URL = "https://TON-PROJET.vercel.app/api/posts";

let posts = [];

async function loadPosts(){
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    posts = data;
    render();

  } catch (err) {
    document.body.innerHTML = "Erreur chargement";
    console.error(err);
  }
}

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  posts.forEach(post => {

    const div = document.createElement("div");
    div.className = "post";

    // carousel
    if(post.media.length > 1){

      div.innerHTML = `
        <div class="carousel">
          <div class="carousel-track">
            ${post.media.map(m => `<img src="${m}">`).join("")}
          </div>
          <button class="btn left">‹</button>
          <button class="btn right">›</button>
        </div>
      `;

      const track = div.querySelector(".carousel-track");
      const left = div.querySelector(".left");
      const right = div.querySelector(".right");

      let index = 0;

      left.onclick = () => {
        index = Math.max(0, index - 1);
        track.style.transform = `translateX(-${index * 100}%)`;
      };

      right.onclick = () => {
        index = Math.min(post.media.length - 1, index + 1);
        track.style.transform = `translateX(-${index * 100}%)`;
      };

    } else {
      div.innerHTML = `<img src="${post.media[0]}">`;
    }

    grid.appendChild(div);
  });
}

loadPosts();

</script>

</body>
</html>
