<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>

body {
  margin: 0;
  background: #f5f5f5;
  font-family: sans-serif;
}

.header {
  padding: 10px;
  display: flex;
  justify-content: space-between;
}

button {
  padding: 6px 12px;
  border: none;
  background: black;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 10px;
}

.post {
  position: relative;
  aspect-ratio: 1;
  overflow: hidden;
  border-radius: 12px;
  cursor: grab;
}

.post:hover::after {
  content: attr(data-title);
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 5px;
  background: rgba(0,0,0,0.6);
  color: white;
  font-size: 12px;
}

.carousel {
  display: flex;
  overflow-x: auto;
}

.carousel img {
  min-width: 100%;
}

img, video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

</style>
</head>

<body>

<div class="header">
  <button onclick="loadPosts()">Refresh</button>
</div>

<div class="grid" id="grid"></div>

<script>

let posts = [];

async function loadPosts(){
  const res = await fetch("/api/posts");
  posts = await res.json();
  render();
}

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  posts.forEach((post, i) => {
    const div = document.createElement("div");
    div.className = "post";
    div.draggable = true;
    div.dataset.index = i;
    div.dataset.title = post.title;

    if(post.type === "carousel"){
      div.innerHTML = `<div class="carousel">
        ${post.media.map(m => `<img src="${m}">`).join("")}
      </div>`;
    }
    else if(post.type === "video"){
      div.innerHTML = `<video src="${post.media[0]}" autoplay muted loop></video>`;
    }
    else {
      div.innerHTML = `<img src="${post.media[0]}">`;
    }

    grid.appendChild(div);
  });

  enableDrag();
}

function enableDrag(){
  const grid = document.getElementById("grid");

  let draggedIndex = null;

  grid.querySelectorAll(".post").forEach((item, index) => {
    item.draggable = true;

    item.addEventListener("dragstart", () => {
      draggedIndex = index;
      item.classList.add("dragging");
    });

    item.addEventListener("dragend", () => {
      item.classList.remove("dragging");
    });
  });

  grid.addEventListener("dragover", (e) => {
    e.preventDefault();

    const afterElement = getClosestElement(grid, e.clientX, e.clientY);
    const draggingEl = document.querySelector(".dragging");

    if (!afterElement) {
      grid.appendChild(draggingEl);
    } else {
      grid.insertBefore(draggingEl, afterElement);
    }
  });

  grid.addEventListener("drop", () => {
    updateOrder();
  });
}

  function getClosestElement(container, x, y) {
  const elements = [...container.querySelectorAll(".post:not(.dragging)")];

  let closest = null;
  let closestDistance = Infinity;

  elements.forEach(el => {
    const rect = el.getBoundingClientRect();

    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;

    const distance = Math.hypot(x - centerX, y - centerY);

    if (distance < closestDistance) {
      closestDistance = distance;
      closest = el;
    }
  });

  return closest;
}

loadPosts();

</script>

</body>
</html>
